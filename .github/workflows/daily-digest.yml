name: Daily Digest

on:
  schedule:
    - cron: '0 3 * * *' # 03:00 UTC = 10:00 Asia/Bangkok
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_NOTIFY_URL: ${{ secrets.LINE_NOTIFY_URL }}
          LINE_NOTIFY_KEY: ${{ secrets.LINE_NOTIFY_KEY }}
          DIGEST_BASE_URL: https://github.com/${{ github.repository }}/blob/main/digests
        run: node digest.js

      - name: Commit digest
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add digests/
          git diff --staged --quiet || git commit -m "Add digest for $(date -u +%F)"
          git push

      - name: Log to Run Ledger
        if: always()
        run: |
          curl -sL -G "${{ secrets.LEDGER_URL }}" \
            --data-urlencode "action=logRun" \
            --data-urlencode "key=${{ secrets.LEDGER_KEY }}" \
            --data-urlencode "source=github-actions" \
            --data-urlencode "skill=daily-digest" \
            --data-urlencode "stage=3" \
            --data-urlencode "status=${{ job.status }}" \
            --data-urlencode "summary=สรุปข่าว/ข้อมูลประจำวัน ส่ง LINE (10:00 น.)" \
            --data-urlencode "link=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true
