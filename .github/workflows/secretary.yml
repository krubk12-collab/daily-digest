name: Personal Secretary

on:
  schedule:
    - cron: '0 23 * * *' # 23:00 UTC = 06:00 Asia/Bangkok -> morning digest
    - cron: '0 11 * * *' # 11:00 UTC = 18:00 Asia/Bangkok -> tonight digest (tomorrow)
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning (today) or tonight (tomorrow)'
        required: false
        default: 'morning'

permissions:
  contents: write

jobs:
  secretary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine mode from trigger
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "mode=tonight" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ github.event.inputs.mode || 'morning' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run secretary digest
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          LINE_NOTIFY_URL: ${{ secrets.LINE_NOTIFY_URL }}
          LINE_NOTIFY_KEY: ${{ secrets.LINE_NOTIFY_KEY }}
        run: node secretary.js

      - name: Commit summary log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add summaries/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no summary changes"
          else
            git commit -m "secretary log: ${{ steps.mode.outputs.mode }} $(date -u +%F)"
            git pull --rebase --autostash origin main || true
            git push origin HEAD:main || true
          fi

      - name: Log to Run Ledger
        if: always()
        run: |
          curl -sL -G "${{ secrets.LEDGER_URL }}" \
            --data-urlencode "action=logRun" \
            --data-urlencode "key=${{ secrets.LEDGER_KEY }}" \
            --data-urlencode "source=github-actions" \
            --data-urlencode "skill=personal-secretary" \
            --data-urlencode "stage=3" \
            --data-urlencode "status=${{ job.status }}" \
            --data-urlencode "summary=เลขาส่วนตัว โหมด ${{ steps.mode.outputs.mode }}" \
            --data-urlencode "link=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            || true
