name: Personal Secretary

on:
  schedule:
    - cron: '0 23 * * *' # 23:00 UTC = 06:00 Asia/Bangkok -> morning digest
    - cron: '0 11 * * *' # 11:00 UTC = 18:00 Asia/Bangkok -> tonight digest (tomorrow)
  workflow_dispatch:
    inputs:
      mode:
        description: 'morning (today) or tonight (tomorrow)'
        required: false
        default: 'morning'

jobs:
  secretary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Determine mode from trigger
        id: mode
        run: |
          if [ "${{ github.event.schedule }}" = "0 23 * * *" ]; then
            echo "mode=morning" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "0 11 * * *" ]; then
            echo "mode=tonight" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ github.event.inputs.mode || 'morning' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run secretary digest
        env:
          MODE: ${{ steps.mode.outputs.mode }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          LINE_NOTIFY_URL: ${{ secrets.LINE_NOTIFY_URL }}
          LINE_NOTIFY_KEY: ${{ secrets.LINE_NOTIFY_KEY }}
        run: node secretary.js
